<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevBlog</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #eaedf2; padding: 20px; max-width: 700px; margin: auto; }
    .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .hidden { display: none; }
    input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
    button:hover { background: #2563eb; }
    .post-title { margin: 0 0 10px 0; color: #1f2937; }
    .post-meta { font-size: 0.85em; color: #6b7280; margin-bottom: 15px; }
    .comment-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #e5e7eb; }
    .comment { background: #f3f4f6; padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 0.9em; }
    .comment strong { color: #374151; }
    .delete-btn { background: #ef4444; float: right; padding: 5px 10px; font-size: 0.8em; }
  </style>
</head>
<body>

  <h1>DevBlog</h1>

  <div class="card" id="authSection">
    <h3>Join the Conversation</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="auth('login')">Login</button>
    <button onclick="auth('register')" style="background: #10b981;">Register</button>
  </div>

  <div id="userPanel" class="card hidden">
    <p>Welcome back, <b id="displayUser"></b>! <button onclick="logout()" style="float:right; background: #6b7280;">Logout</button></p>
  </div>

  <div class="card hidden" id="createPostSection">
    <h3>Write a New Post</h3>
    <input type="text" id="postTitle" placeholder="Post Title">
    <textarea id="postContent" rows="4" placeholder="What's on your mind?"></textarea>
    <button onclick="createPost()">Publish Post</button>
  </div>

  <div id="feed"></div>

  <script>
    let token = localStorage.getItem('token');
    let currentUser = localStorage.getItem('username');

    if (token) setupSession();

    async function auth(action) {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;

      const res = await fetch(`/api/${action}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();

      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        token = data.token;
        currentUser = data.username;
        setupSession();
      } else {
        alert(data.message || data.error);
      }
    }

    function setupSession() {
      document.getElementById('authSection').classList.add('hidden');
      document.getElementById('userPanel').classList.remove('hidden');
      document.getElementById('createPostSection').classList.remove('hidden');
      document.getElementById('displayUser').innerText = currentUser;
      loadPosts(); // Reload to show delete buttons if applicable
    }

    function logout() {
      localStorage.clear();
      location.reload();
    }

    async function loadPosts() {
      const res = await fetch('/api/posts');
      const posts = await res.json();
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      
      posts.forEach(post => {
        // Only show delete button if the logged-in user is the author
        const deleteBtn = (currentUser === post.author) 
          ? `<button class="delete-btn" onclick="deletePost('${post._id}')">Delete Post</button>` 
          : '';

        // Generate Comments HTML
        const commentsHTML = post.comments.map(c => 
          `<div class="comment"><strong>${c.author}:</strong> ${c.text}</div>`
        ).join('');

        // Generate Comment Input Form (Only if logged in)
        const commentForm = token ? `
          <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="comment-${post._id}" placeholder="Write a comment..." style="margin:0;">
            <button onclick="addComment('${post._id}')">Post</button>
          </div>
        ` : `<p style="font-size:0.8em; color:gray;">Log in to comment.</p>`;

        feed.innerHTML += `
          <div class="card">
            ${deleteBtn}
            <h2 class="post-title">${post.title}</h2>
            <div class="post-meta">By ${post.author} on ${new Date(post.createdAt).toLocaleDateString()}</div>
            <p>${post.content}</p>
            
            <div class="comment-section">
              <h4>Comments (${post.comments.length})</h4>
              ${commentsHTML}
              ${commentForm}
            </div>
          </div>
        `;
      });
    }

    async function createPost() {
      const title = document.getElementById('postTitle').value;
      const content = document.getElementById('postContent').value;

      await fetch('/api/posts', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title, content })
      });
      
      document.getElementById('postTitle').value = '';
      document.getElementById('postContent').value = '';
      loadPosts();
    }

    async function deletePost(id) {
      if(confirm('Are you sure you want to delete this post?')) {
        await fetch(`/api/posts/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        loadPosts();
      }
    }

    async function addComment(postId) {
      const text = document.getElementById(`comment-${postId}`).value;
      if (!text) return;

      await fetch(`/api/posts/${postId}/comments`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ text })
      });
      loadPosts();
    }

    // Load posts initially when the page opens
    loadPosts();
  </script>
</body>
</html>
